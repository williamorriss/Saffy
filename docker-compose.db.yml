services:
  # DATABASE SERVER
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${PG_USER}
      POSTGRES_PASSWORD: ${PG_PASSWORD}
      POSTGRES_DB: ${PG_DATABASE}
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  # DATABASE INITIALIZER
  db-init:
    image: postgres:16-alpine
    profiles: ["setup"]
    environment:
      PGPASSWORD: ${PG_PASSWORD}
    volumes:
      - ./backend/sql/schema.sql:/schema.sql:ro
    entrypoint: ["psql", "-h", "db", "-U", "${PG_USER}", "-d", "${PG_DATABASE}", "-f", "/schema.sql"]
    depends_on:
      - db

volumes:
  pgdata: