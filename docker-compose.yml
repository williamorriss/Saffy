services:
  # RUST BACKEND
  backend:
    build: ./backend
    restart: on-failure
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
      - cargo-cache:/usr/local/cargo/registry
      - target-cache:/app/target
    environment:
      DATABASE_URL: postgresql://${PG_USER}:${PG_PASSWORD}@db:5432/${PG_DATABASE}
    # Note: depends_on works across files if using the same project name
    depends_on:
      - db

  # FRONTEND (Vite/Node)
  frontend:
    build: ./frontend
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      - backend

volumes:
  cargo-cache:
  target-cache: